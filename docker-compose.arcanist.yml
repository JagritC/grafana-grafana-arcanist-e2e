services:
  grafana:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-ubuntu
      args:
        GO_BUILD_TAGS: oss
        WIRE_TAGS: oss
        JS_NODE_ENV: production
        JS_YARN_BUILD_FLAG: build
        JS_YARN_INSTALL_FLAG: --immutable
    environment:
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_HTTP_PORT: "3000"
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ./benchmark/arcanist-grafana/provisioning:/etc/grafana/provisioning:ro
      - ./benchmark/arcanist-grafana/dashboards:/var/lib/grafana/dashboards:ro
